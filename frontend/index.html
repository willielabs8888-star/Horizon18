<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horizon18</title>

  <!-- Umami analytics (privacy-friendly, no cookies) -->
  <script defer src="https://cloud.umami.is/script.js" data-website-id="f321ba8a-9929-4e10-87ce-776aea016492"></script>

  <!-- React + ReactDOM + peer dependencies for Recharts UMD -->
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-is@18/umd/react-is.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prop-types@15/prop-types.min.js"></script>
  <!-- Recharts UMD bundle (exposes window.Recharts) -->
  <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.min.js"></script>
  <!-- Diagnostic: verify all CDN libraries loaded before app runs -->
  <script>
    window.addEventListener('DOMContentLoaded', function() {
      var missing = [];
      if (!window.React) missing.push('React');
      if (!window.ReactDOM) missing.push('ReactDOM');
      if (!window.ReactIs) missing.push('react-is');
      if (!window.PropTypes) missing.push('prop-types');
      if (!window.Recharts) missing.push('Recharts');
      if (missing.length > 0) {
        document.getElementById('root').innerHTML =
          '<div style="color:#ef4444;padding:40px;text-align:center;font-family:sans-serif;">' +
          '<h2>Failed to load libraries</h2>' +
          '<p style="margin-top:12px;">Missing: ' + missing.join(', ') + '</p>' +
          '<p style="margin-top:8px;color:#9ca3af;">Check your internet connection or try refreshing. ' +
          'Open browser console (F12) for details.</p></div>';
      }
    });
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #22263a;
      --border: #2a2e3f;
      --text: #e4e4e7;
      --text-dim: #9ca3af;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --danger: #ef4444;
      --success: #22c55e;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .app { max-width: 1600px; margin: 0 auto; padding: 24px 32px; }

    /* HEADER */
    .header { text-align: center; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
    .header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
    .header p { color: var(--text-dim); font-size: 15px; }

    /* BADGES */
    .status-bar { display: flex; justify-content: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .badge { font-size: 12px; padding: 4px 12px; border-radius: 99px; background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); }
    .badge.active { border-color: var(--accent); color: var(--accent); }

    /* LOADING */
    .loading { text-align: center; padding: 80px 20px; color: var(--text-dim); }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ERROR */
    .error-box { text-align: center; padding: 40px 20px; background: var(--surface); border: 1px solid var(--danger); border-radius: 12px; margin: 20px 0; }
    .error-box h3 { color: var(--danger); margin-bottom: 8px; }

    /* CARDS */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
    .card h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .card .subtitle { color: var(--text-dim); font-size: 13px; margin-bottom: 20px; }

    /* SUMMARY GRID */
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .summary-card .label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .summary-card .value { font-size: 22px; font-weight: 700; }
    .summary-card .detail { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

    /* LEGEND */
    .legend { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-dim); }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* TOOLTIP */
    .custom-tooltip { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .custom-tooltip .age-label { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; font-weight: 600; }
    .tooltip-row { display: flex; justify-content: space-between; gap: 16px; font-size: 13px; padding: 2px 0; }

    /* FOOTER */
    .footer { text-align: center; padding: 24px 0; color: var(--text-dim); font-size: 12px; border-top: 1px solid var(--border); margin-top: 40px; }

    /* ========== QUIZ STYLES ========== */
    .quiz-container { max-width: 900px; margin: 0 auto; }
    .quiz-progress { display: flex; gap: 4px; margin-bottom: 32px; }
    .quiz-progress .step { flex: 1; height: 4px; border-radius: 2px; background: var(--border); transition: background 0.3s; }
    .quiz-progress .step.done { background: var(--accent); }
    .quiz-progress .step.current { background: var(--accent-hover); }

    .quiz-step { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .quiz-step h2 { font-size: 22px; margin-bottom: 8px; }
    .quiz-step .hint { color: var(--text-dim); font-size: 14px; margin-bottom: 24px; }

    /* Path type cards with add button */
    .path-type-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
      transition: all 0.2s;
    }
    .path-type-card:hover { border-color: var(--accent); }
    .path-type-header { display: flex; justify-content: space-between; align-items: center; }
    .path-type-header .path-name { font-weight: 600; font-size: 15px; }
    .path-type-header .path-desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .add-btn {
      padding: 6px 14px; border-radius: 6px; border: 1px solid var(--accent);
      background: transparent; color: var(--accent); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .add-btn:hover { background: var(--accent); color: white; }
    .add-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Instance chips under path type */
    .instance-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .instance-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 6px; font-size: 12px;
      border: 1px solid var(--border); background: var(--bg);
    }
    .instance-chip .remove-btn {
      background: none; border: none; color: var(--danger); cursor: pointer;
      font-size: 14px; padding: 0 2px; line-height: 1;
    }
    .instance-chip .remove-btn:hover { color: #f87171; }

    /* Form fields */
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
    .form-group .field-hint { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }

    .form-select, .form-input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-select:focus, .form-input:focus { border-color: var(--accent); }
    .form-select option { background: var(--bg); }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
    }
    .toggle-row:hover { border-color: var(--accent); }
    .toggle-indicator { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .toggle-indicator.on { background: var(--accent); border-color: var(--accent); }

    /* Buttons */
    .btn-row { display: flex; gap: 12px; margin-top: 28px; }
    .btn {
      padding: 12px 28px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--accent); color: white; flex: 1; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary { background: var(--surface); color: var(--text-dim); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--surface-hover); color: var(--text); }

    /* Path-specific question sections */
    .path-section { border-left: 3px solid var(--accent); padding-left: 16px; margin-bottom: 24px; transition: all 0.3s; }
    .path-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }

    /* Collapsible path sections */
    .path-section-header {
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none; padding: 4px 0;
    }
    .path-section-header:hover { opacity: 0.85; }
    .path-section-toggle {
      font-size: 11px; color: var(--text-dim); transition: transform 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .path-section-toggle .chevron { display: inline-block; transition: transform 0.2s; }
    .path-section-toggle .chevron.collapsed { transform: rotate(-90deg); }
    .path-section-body { overflow: hidden; transition: max-height 0.3s ease; }
    .path-section-body.collapsed { max-height: 0 !important; overflow: hidden; }

    /* Path completion status badge */
    .path-status {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 500; padding: 2px 8px;
      border-radius: 10px; margin-left: 8px;
    }
    .path-status.complete { background: #065f4620; color: #10b981; }
    .path-status.incomplete { background: #f5920020; color: #f59e0b; }

    /* Missing field highlight */
    .field-missing .form-select,
    .field-missing .form-input {
      border-color: #f59e0b !important;
      box-shadow: 0 0 0 2px #f59e0b30;
    }
    .field-missing-hint {
      color: #f59e0b; font-size: 12px; margin-top: 4px;
      animation: fadeIn 0.3s ease;
    }

    /* Needs-attention prompt for step 0 chips */
    .instance-chip .needs-action {
      font-size: 11px; color: #f59e0b; font-style: italic;
    }
    .instance-chip .configured {
      font-size: 11px; color: #10b981;
    }

    /* Disclaimer banner */
    .disclaimer-banner {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; margin-bottom: 16px; border-radius: 8px;
      background: rgba(99, 102, 241, 0.08); border: 1px solid rgba(99, 102, 241, 0.2);
      font-size: 12px; color: var(--text-dim); line-height: 1.5;
    }
    .disclaimer-banner svg { flex-shrink: 0; }

    /* Chart tabs */
    .chart-tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
    .chart-tab {
      padding: 8px 16px;
      border-radius: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .chart-tab:hover { border-color: var(--accent); color: var(--text); }
    .chart-tab.active { background: var(--accent); color: white; border-color: var(--accent); }

    /* ========== SCHOOL SEARCH STYLES ========== */
    .school-search-wrap { position: relative; }
    .school-search-input {
      width: 100%; padding: 10px 14px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .school-search-input:focus { border-color: var(--accent); }
    .school-search-input::placeholder { color: var(--text-dim); }
    .school-results {
      position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      margin-top: 4px; max-height: 260px; overflow-y: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .school-result-item {
      padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border);
      transition: background 0.15s; display: flex; justify-content: space-between; align-items: center;
    }
    .school-result-item:last-child { border-bottom: none; }
    .school-result-item:hover { background: var(--surface-hover); }
    .school-result-name { font-size: 13px; font-weight: 500; }
    .school-result-meta { font-size: 11px; color: var(--text-dim); }
    .school-selected {
      display: flex; align-items: center; gap: 8px; padding: 10px 14px;
      background: var(--bg); border: 1px solid var(--accent); border-radius: 8px;
      font-size: 13px;
    }
    .school-selected .school-clear {
      background: none; border: none; color: var(--danger); cursor: pointer;
      font-size: 13px; padding: 2px 6px; border-radius: 4px; margin-left: auto;
    }
    .school-selected .school-clear:hover { background: rgba(239,68,68,0.1); }
    .school-mode-toggle {
      display: flex; gap: 8px; margin-bottom: 8px;
    }
    .school-mode-btn {
      padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--text-dim); font-size: 12px;
      cursor: pointer; transition: all 0.2s;
    }
    .school-mode-btn:hover { border-color: var(--accent); color: var(--text); }
    .school-mode-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    /* ========== SCHOOL STATS PANEL ========== */
    .stats-panel {
      background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
      padding: 16px; margin: 12px 0 16px;
    }
    .stats-panel-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    .stats-panel-header h4 { font-size: 14px; font-weight: 600; margin: 0; }
    .stats-panel-header .stats-badge {
      font-size: 11px; padding: 2px 8px; border-radius: 4px;
      background: var(--surface); color: var(--text-dim);
    }
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
    }
    .stat-item { padding: 8px; border-radius: 6px; background: var(--surface); }
    .stat-item .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
    .stat-item .stat-value { font-size: 16px; font-weight: 700; }
    .stat-item .stat-value.highlight { color: var(--accent); }
    .stat-item .stat-detail { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
    .stats-disclaimer {
      font-size: 10px; color: var(--text-dim); margin-top: 10px; padding-top: 8px;
      border-top: 1px solid var(--border); line-height: 1.5;
    }

    /* ========== HOW IT WORKS STYLES ========== */
    .hiw-section { margin-bottom: 8px; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
    .hiw-header {
      padding: 14px 16px; cursor: pointer; display: flex; justify-content: space-between;
      align-items: center; background: var(--bg); transition: background 0.2s;
    }
    .hiw-header:hover { background: var(--surface-hover); }
    .hiw-header h4 { font-size: 14px; font-weight: 600; margin: 0; display: flex; align-items: center; gap: 8px; }
    .hiw-body { padding: 16px 20px; border-top: 1px solid var(--border); animation: fadeIn 0.25s ease; }
    .hiw-body p { margin-bottom: 10px; font-size: 13px; line-height: 1.7; color: var(--text-dim); }
    .hiw-body strong { color: var(--text); }
    .hiw-timeline {
      position: relative; padding-left: 24px; margin: 12px 0 16px;
      border-left: 2px solid var(--border);
    }
    .hiw-timeline-step {
      position: relative; padding: 6px 0 12px; font-size: 13px; color: var(--text-dim); line-height: 1.6;
    }
    .hiw-timeline-step::before {
      content: ""; position: absolute; left: -29px; top: 10px;
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent); border: 2px solid var(--bg);
    }
    .hiw-formula {
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      padding: 10px 14px; margin: 8px 0 12px; font-family: inherit;
      font-size: 13px; color: #d1d5db; line-height: 1.8; overflow-x: auto;
    }
    .hiw-note {
      font-size: 11px; color: var(--text-dim); font-style: italic;
      padding: 6px 10px; background: var(--surface-hover); border-radius: 4px;
      margin-top: 8px; display: inline-block;
    }
    .hiw-badge {
      display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 99px;
      background: var(--surface); border: 1px solid var(--border); color: var(--text-dim);
      font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase;
    }

    /* Responsive */
    @media (max-width: 700px) {
      .app { padding: 16px 12px; }
      .header h1 { font-size: 22px; }
      .summary-grid { grid-template-columns: 1fr 1fr; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .btn-row { flex-direction: column; }
      .chart-tabs { gap: 6px; }
      .chart-tab { padding: 6px 10px; font-size: 12px; }
      .school-selected { flex-wrap: wrap; }
      .legend { gap: 10px; }
      .status-bar { gap: 6px; }
      .path-type-header { flex-wrap: wrap; gap: 8px; }
    }
    @media (max-width: 400px) {
      .stats-grid { grid-template-columns: 1fr; }
      .summary-grid { grid-template-columns: 1fr; }
      .quiz-container { padding: 0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!--
    Smart loader: uses pre-compiled app.js in production (faster, no Babel overhead).
    Falls back to Babel standalone + raw JSX in development if app.js doesn't exist.
    Run ./build.sh to generate app.js from app.jsx.
  -->
  <script>
    (function() {
      var script = document.createElement('script');
      script.src = 'app.js';
      script.onerror = function() {
        // app.js not found — load Babel standalone and raw JSX as dev fallback
        console.warn('app.js not found. Loading Babel + JSX fallback (run ./build.sh for production).');
        var babel = document.createElement('script');
        babel.src = 'https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.0/babel.min.js';
        babel.onload = function() {
          var jsx = document.createElement('script');
          jsx.type = 'text/babel';
          jsx.src = 'app.jsx';
          jsx.setAttribute('data-type', 'module');
          document.body.appendChild(jsx);
        };
        document.body.appendChild(babel);
      };
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
